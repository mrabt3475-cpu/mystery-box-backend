<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 فتح الصندوق - PuzzleChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --gold: #f59e0b; --silver: #9ca3af; --bronze: #cd7f32; --diamond: #06b6d4; --danger: #ef4444; --dark: #0f172a; --dark-secondary: #1e293b; --dark-tertiary: #334155; --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; overflow: hidden; }

        .container { max-width: 800px; margin: 0 auto; padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .back-btn { position: fixed; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 0.75rem 1.25rem; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; z-index: 100; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .box-display { position: relative; width: 300px; height: 300px; margin: 2rem 0; }
        
        .box-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: glowPulse 2s ease-in-out infinite; }
        .box-glow.bronze { background: var(--bronze); }
        .box-glow.silver { background: var(--silver); }
        .box-glow.gold { background: var(--gold); }
        .box-glow.diamond { background: var(--diamond); }

        @keyframes glowPulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); } }

        .box-icon { font-size: 8rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: shake 0.5s ease-in-out infinite; }
        .box-icon.bronze { color: var(--bronze); }
        .box-icon.silver { color: var(--silver); }
        .box-icon.gold { color: var(--gold); }
        .box-icon.diamond { color: var(--diamond); }

        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-50%, -50%) rotate(-5deg); } 75% { transform: translate(-50%, -50%) rotate(5deg); } }

        .box-name { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; }
        .box-cost { font-size: 1.25rem; color: var(--secondary); font-weight: 600; }

        .countdown { font-size: 4rem; font-weight: 900; margin: 2rem 0; color: var(--gold); text-shadow: 0 0 30px rgba(245, 158, 11, 0.5); }

        .spin-animation { animation: spin 0.3s linear infinite; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .prize-reveal { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .prize-reveal.show { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .prize-icon { font-size: 8rem; margin-bottom: 1rem; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .prize-name { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--gold), var(--danger)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .prize-value { font-size: 1.5rem; color: var(--secondary); font-weight: 600; margin-bottom: 2rem; }

        .action-btn { padding: 1rem 3rem; border-radius: 15px; font-size: 1.25rem; font-weight: 700; cursor: pointer; transition: all 0.3s; border: none; }
        .action-btn.open { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .action-btn.open:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5); }
        .action-btn.continue { background: linear-gradient(135deg, var(--secondary), #059669); color: white; }
        .action-btn.continue:hover { transform: translateY(-3px); }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: particleFall 3s linear infinite; }
        @keyframes particleFall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .confetti-piece { position: absolute; width: 10px; height: 20px; animation: confettiFall 3s ease-out forwards; }
        @keyframes confettiFall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .loading-dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="confetti" id="confetti"></div>

    <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-right"></i> رجوع</button>

    <div class="container">
        <div id="boxSelection">
            <h1 class="box-name">اختر الصندوق</h1>
            <p class="box-cost">رصيدك: <span id="userPoints">0</span> نقطة</p>
            
            <div class="box-display">
                <div class="box-glow" id="boxGlow"></div>
                <div class="box-icon" id="boxIcon">📦</div>
            </div>

            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 2rem;">
                <button class="action-btn open" onclick="selectBox('bronze', 10)">
                    <i class="fas fa-box"></i> برونز (10)
                </button>
                <button class="action-btn open" onclick="selectBox('silver', 25)">
                    <i class="fas fa-box"></i> فضة (25)
                </button>
                <button class="action-btn open" onclick="selectBox('gold', 50)">
                    <i class="fas fa-box"></i> ذهب (50)
                </button>
                <button class="action-btn open" onclick="selectBox('diamond', 100)">
                    <i class="fas fa-box"></i> ماس (100)
                </button>
            </div>
        </div>

        <div id="openingPhase" style="display: none;">
            <h1 class="box-name" id="openingBoxName">صندوق البرونز</h1>
            <div class="box-display">
                <div class="box-glow" id="openingGlow"></div>
                <div class="box-icon spin-animation" id="openingIcon">📦</div>
            </div>
            <div class="countdown" id="countdown">3</div>
            <p style="color: var(--text-muted);">جاري فتح الصندوق<span class="loading-dots"></span></p>
        </div>

        <div class="prize-reveal" id="prizeReveal">
            <div class="prize-icon" id="prizeIcon">🎁</div>
            <h2 class="prize-name" id="prizeName">جائزة!</h2>
            <p class="prize-value" id="prizeValue">$0</p>
            <button class="action-btn continue" onclick="continueOpening()">
                <i class="fas fa-arrow-right"></i>繼續
            </button>
        </div>
    </div>

    <script>
        const boxData = {
            bronze: { name: 'صندوق البرونز', icon: '📦', color: 'bronze', prizes: [
                { name: 'بطاقة هدية $5', value: 5, icon: '🎁' },
                { name: 'كأس صغير', value: 10, icon: '🏆' },
                { name: 'سماعات', value: 25, icon: '🎧' },
                { name: 'ساعة يد', value: 50, icon: '⌚' }
            ]},
            silver: { name: 'صندوق الفضة', icon: '✨', color: 'silver', prizes: [
                { name: 'آيفون 12', value: 400, icon: '📱' },
                { name: 'ماكبوك اير', value: 600, icon: '💻' },
                { name: 'آيباد', value: 500, icon: '📱' },
                { name: 'ساعة أبل', value: 300, icon: '⌚' }
            ]},
            gold: { name: 'صندوق الذهب', icon: '🏆', color: 'gold', prizes: [
                { name: 'ماك برو', value: 1200, icon: '💻' },
                { name: 'آيباد برو', value: 800, icon: '📱' },
                { name: 'سامسونج S21', value: 700, icon: '📱' },
                { name: 'بلايستيشن 5', value: 500, icon: '🎮' }
            ]},
            diamond: { name: 'صندوق الماس', icon: '💎', color: 'diamond', prizes: [
                { name: 'سيارة Tesla', value: 50000, icon: '🚗' },
                { name: 'شقة في دبي', value: 100000, icon: '🏠' },
                { name: 'ذهب 1kg', value: 60000, icon: '🥇' },
                { name: 'مجوهرات', value: 30000, icon: '💍' }
            ]}
        };

        let selectedBox = null;
        let userPoints = 0;

        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) { alert('سجل دخول أولاً!'); return; }

                const res = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const user = await res.json();
                    userPoints = user.points || 0;
                    document.getElementById('userPoints').textContent = userPoints;
                }
            } catch (e) { console.error(e); }
        }

        function selectBox(type, cost) {
            if (userPoints < cost) {
                alert('نقاطك insufficient! اذهب لتسوق واحصل على نقاط.');
                return;
            }

            selectedBox = { type, cost };
            document.getElementById('boxSelection').style.display = 'none';
            document.getElementById('openingPhase').style.display = 'block';

            const box = boxData[type];
            document.getElementById('openingBoxName').textContent = box.name;
            document.getElementById('openingIcon').className = `box-icon spin-animation ${box.color}`;
            document.getElementById('openingGlow').className = `box-glow ${box.color}`;

            startCountdown();
        }

        function startCountdown() {
            let count = 3;
            const countdown = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                countdown.textContent = count;
                count--;
                
                if (count < 0) {
                    clearInterval(interval);
                    countdown.textContent = '🎉';
                    revealPrize();
                }
            }, 1000);
        }

        function revealPrize() {
            const box = boxData[selectedBox.type];
            const prize = box.prizes[Math.floor(Math.random() * box.prizes.length)];

            setTimeout(() => {
                document.getElementById('openingPhase').style.display = 'none';
                document.getElementById('prizeReveal').classList.add('show');

                document.getElementById('prizeIcon').textContent = prize.icon;
                document.getElementById('prizeName').textContent = prize.name;
                document.getElementById('prizeValue').textContent = '$' + prize.value.toLocaleString();

                createConfetti();
                playSound();
            }, 500);
        }

        function createConfetti() {
            const confettiContainer = document.getElementById('confetti');
            const colors = ['#f59e0b', '#ef4444', '#10b981', '#6366f1', '#ec4899'];

            for (let i = 0; i < 100; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                confettiContainer.appendChild(piece);
            }

            setTimeout(() => confettiContainer.innerHTML = '', 5000);
        }

        function playSound() {
            // Placeholder for sound effect
            // In production, add: new Audio('/sounds/win.mp3').play();
        }

        function continueOpening() {
            userPoints -= selectedBox.cost;
            document.getElementById('userPoints').textContent = userPoints;
            document.getElementById('prizeReveal').classList.remove('show');
            document.getElementById('boxSelection').style.display = 'block';
        }

        function goBack() {
            window.location.href = '/boxes';
        }

        // Create background particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.background = ['#6366f1', '#10b981', '#f59e0b'][Math.floor(Math.random() * 3)];
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = (5 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        loadUserData();
    </script>
</body>
</html>
