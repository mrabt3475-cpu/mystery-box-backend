<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 المنتجات - PuzzleChain</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-secondary: #1e293b;
            --dark-tertiary: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(239, 68, 68, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10%, -10%) rotate(5deg); }
        }

        /* Navbar */
        .navbar {
            background: var(--dark-secondary);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-link.active {
            color: var(--primary);
        }

        .balance-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: var(--secondary);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .filter-btn {
            background: var(--dark-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Search */
        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            background: var(--dark-secondary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem 0.75rem 3rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Product Card */
        .product-card {
            background: var(--dark-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .product-image {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, var(--dark-tertiary), var(--dark));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--secondary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .product-badge.discount {
            background: var(--danger);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .product-description {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .original-price {
            font-size: 1rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .product-points {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(16, 185, 129, 0.2));
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .product-points i {
            color: var(--secondary);
        }

        .product-stock {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .stock-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
        }

        .stock-indicator.low {
            background: #f59e0b;
        }

        .stock-indicator.out {
            background: var(--danger);
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .buy-btn:disabled {
            background: var(--dark-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        /* Category Tags */
        .category-tag {
            display: inline-block;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--dark-tertiary);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--dark-tertiary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--dark-secondary);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-color: var(--secondary);
        }

        .toast.error {
            border-color: var(--danger);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--dark-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-body {
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .modal-btn.cancel {
            background: var(--dark-tertiary);
            color: var(--text);
        }

        .modal-btn.confirm {
            background: var(--secondary);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <i class="fas fa-gift"></i>
                PuzzleChain
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i>
                    الرئيسية
                </a>
                <a href="/products" class="nav-link active">
                    <i class="fas fa-shopping-bag"></i>
                    المنتجات
                </a>
                <a href="/boxes" class="nav-link">
                    <i class="fas fa-box"></i>
                    الصناديق
                </a>
                <a href="/wallet" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    المحفظة
                </a>
                <div class="balance-badge">
                    <i class="fas fa-coins"></i>
                    <span id="userPoints">0</span> نقطة
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-shopping-bag"></i>
                المنتجات
            </h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-category="all">
                <i class="fas fa-th"></i>
                الكل
            </button>
            <button class="filter-btn" data-category="phone">
                <i class="fas fa-mobile-alt"></i>
                جوالات
            </button>
            <button class="filter-btn" data-category="laptop">
                <i class="fas fa-laptop"></i>
                أجهزة لوحية
            </button>
            <button class="filter-btn" data-category="watch">
                <i class="fas fa-clock"></i>
                ساعات
            </button>
            <button class="filter-btn" data-category="gaming">
                <i class="fas fa-gamepad"></i>
                ألعاب
            </button>
            <button class="filter-btn" data-category="accessories">
                <i class="fas fa-headphones"></i>
                إكسسوارات
            </button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Purchase Modal -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">تأكيد الشراء</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic Content -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeModal()">إلغاء</button>
                <button class="modal-btn confirm" onclick="confirmPurchase()">تأكيد الشراء</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // State
        let products = [];
        let filteredProducts = [];
        let currentCategory = 'all';
        let selectedProduct = null;
        let userPoints = 0;
        let userBalance = 0;

        // API Base URL
        const API_URL = 'http://localhost:3000/api';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadProducts();
            setupFilters();
            setupSearch();
        });

        // Load User Data
        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    userPoints = user.points || 0;
                    userBalance = user.balance || 0;
                    document.getElementById('userPoints').textContent = userPoints;
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Load Products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/product`);
                const data = await response.json();
                
                products = data.map(product => ({
                    ...product,
                    discount: Math.random() > 0.7 ? Math.floor(Math.random() * 30) + 10 : 0,
                    originalPrice: product.price
                }));
                
                if (product.discount > 0) {
                    product.price = product.price * (1 - product.discount / 100);
                }

                filteredProducts = [...products];
                renderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                showEmptyState();
            }
        }

        // Render Products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            
            if (filteredProducts.length === 0) {
                showEmptyState();
                return;
            }

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" data-category="${product.category || 'accessories'}">
                    <div class="product-image">
                        <img src="${product.image || 'https://via.placeholder.com/300x200?text=Product'}" 
                             alt="${product.name}"
                             onerror="this.src='https://via.placeholder.com/300x200?text=Product'">
                        ${product.discount > 0 ? `<span class="product-badge discount">-${product.discount}%</span>` : ''}
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-description">${product.description || 'منتج عالي الجودة'}</p>
                        
                        <div class="product-price">
                            <span class="current-price">$${product.price.toFixed(2)}</span>
                            ${product.discount > 0 ? `<span class="original-price">$${product.originalPrice.toFixed(2)}</span>` : ''}
                        </div>

                        <div class="product-points">
                            <i class="fas fa-coins"></i>
                            +${Math.floor(product.originalPrice * 0.05)} نقطة عند الشراء
                        </div>

                        <div class="product-stock">
                            <span class="stock-indicator ${product.stock < 5 ? 'low' : ''} ${product.stock === 0 ? 'out' : ''}"></span>
                            <span>المخزون: ${product.stock || 10}</span>
                        </div>

                        <button class="buy-btn" 
                                onclick="openPurchaseModal('${product._id}')"
                                ${product.stock === 0 ? 'disabled' : ''}>
                            <i class="fas fa-shopping-cart"></i>
                            ${product.stock === 0 ? 'نفذت الكمية' : 'شراء الآن'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Show Empty State
        function showEmptyState() {
            document.getElementById('productsGrid').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>لا توجد منتجات</h3>
                    <p>لم يتم العثور على منتجات في الوقت الحالي</p>
                </div>
            `;
        }

        // Setup Filters
        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    currentCategory = btn.dataset.category;
                    filterProducts();
                });
            });
        }

        // Filter Products
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredProducts = products.filter(product => {
                const matchesCategory = currentCategory === 'all' || 
                    (product.category || 'accessories').toLowerCase() === currentCategory;
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) ||
                    product.description?.toLowerCase().includes(searchTerm);
                
                return matchesCategory && matchesSearch;
            });

            renderProducts();
        }

        // Setup Search
        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', filterProducts);
        }

        // Open Purchase Modal
        function openPurchaseModal(productId) {
            selectedProduct = products.find(p => p._id === productId);
            if (!selectedProduct) return;

            const pointsEarned = Math.floor(selectedProduct.originalPrice * 0.05);
            
            document.getElementById('modalBody').innerHTML = `
                <div style="text-align: center;">
                    <img src="${selectedProduct.image || 'https://via.placeholder.com/200x150'}" 
                         style="width: 200px; border-radius: 12px; margin-bottom: 1rem;">
                    <h3 style="margin-bottom: 0.5rem;">${selectedProduct.name}</h3>
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">
                        ${selectedProduct.description || 'منتج عالي الجودة'}
                    </p>
                    <div style="background: var(--dark); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>السعر:</span>
                            <span style="color: var(--secondary); font-weight: 700;">$${selectedProduct.price.toFixed(2)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>رصيدك:</span>
                            <span>$${userBalance.toFixed(2)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 0.5rem;">
                            <span>ستحصل على:</span>
                            <span style="color: var(--secondary); font-weight: 700;">
                                <i class="fas fa-coins"></i> ${pointsEarned} نقطة
                            </span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('purchaseModal').classList.add('show');
        }

        // Close Modal
        function closeModal() {
            document.getElementById('purchaseModal').classList.remove('show');
            selectedProduct = null;
        }

        // Confirm Purchase
        async function confirmPurchase() {
            if (!selectedProduct) return;

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showToast('يرجى تسجيل الدخول أولاً', 'error');
                    return;
                }

                const response = await fetch(`${API_URL}/purchase`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productId: selectedProduct._id })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(`تم الشراء بنجاح! حصلت على ${data.pointsAdded || 0} نقطة`, 'success');
                    userBalance = data.balance;
                    userPoints = data.points;
                    document.getElementById('userPoints').textContent = userPoints;
                    closeModal();
                } else {
                    showToast(data.error || 'حدث خطأ', 'error');
                }
            } catch (error) {
                console.error('Purchase error:', error);
                showToast('حدث خطأ في الاتصال', 'error');
            }
        }

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `toast ${type} show`;
            toast.querySelector('i').className = type === 'success' ? 
                'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toastMessage.textContent = message;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal on overlay click
        document.getElementById('purchaseModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });
    </script>
</body>
</html>
