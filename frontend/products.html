<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ المنتجات - PuzzleChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --gold: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark-secondary: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-animation::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%); animation: bgMove 20s ease-in-out infinite; }
        @keyframes bgMove { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--text); background: rgba(99, 102, 241, 0.2); }
        .balance-badge { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .container { max-width: 1400px; margin: 0 auto; padding: 6rem 2rem 2rem; }

        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .page-title i { color: var(--secondary); }
        .page-subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 1rem; }
        .points-info { display: inline-block; background: rgba(16, 185, 129, 0.2); padding: 0.75rem 1.5rem; border-radius: 12px; color: var(--secondary); font-weight: 600; }

        .filters { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-btn { padding: 0.75rem 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }

        .product-card { background: var(--dark-secondary); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        .product-badge { position: absolute; top: 1rem; left: 1rem; background: var(--secondary); color: white; padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

        .product-image { width: 100%; height: 180px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 1rem; }

        .product-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .product-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; height: 40px; overflow: hidden; }

        .product-price { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .price-original { text-decoration: line-through; color: var(--text-muted); font-size: 0.9rem; }
        .price-current { font-size: 1.5rem; font-weight: 800; color: var(--secondary); }

        .points-earned { background: rgba(245, 158, 11, 0.2); padding: 0.5rem 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem; }
        .points-earned span { color: var(--gold); font-weight: 700; }

        .product-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--secondary), #059669); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .product-btn:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        .cart-sidebar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .cart-sidebar.open { display: block; }
        .cart-panel { position: fixed; top: 0; left: 0; width: 400px; max-width: 100%; height: 100%; background: var(--dark-secondary); z-index: 2001; transform: translateX(-100%); transition: transform 0.3s; padding: 2rem; overflow-y: auto; }
        .cart-panel.open { transform: translateX(0); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .cart-title { font-size: 1.5rem; font-weight: 700; }
        .cart-close { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }

        .cart-items { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .cart-item-info { display: flex; align-items: center; gap: 1rem; }
        .cart-item-icon { font-size: 2rem; }
        .cart-item-name { font-weight: 600; }
        .cart-item-price { color: var(--secondary); font-weight: 600; }
        .cart-item-remove { background: rgba(239, 68, 68, 0.2); border: none; color: var(--danger); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }

        .cart-total { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; }
        .cart-total-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .cart-total-row.final { font-size: 1.25rem; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.5rem; }

        .checkout-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .checkout-btn:hover { box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }

        .cart-toggle { position: fixed; bottom: 2rem; left: 2rem; width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; cursor: pointer; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); z-index: 1000; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }

        @media (max-width: 768px) { .navbar-content { flex-direction: column; } .cart-panel { width: 100%; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo"><i class="fas fa-gift"></i> PuzzleChain</div>
            <div class="nav-links">
                <a href="/" class="nav-link">الرئيسية</a>
                <a href="/products" class="nav-link active">المنتجات</a>
                <a href="/boxes" class="nav-link">الصناديق</a>
                <a href="/wallet" class="nav-link">المحفظة</a>
                <div class="balance-badge"><i class="fas fa-coins"></i> <span id="userPoints">0</span> نقطة</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-shopping-bag"></i> تسوق واحصل على نقاط!</h1>
            <p class="page-subtitle">اشترِ منتجات واحصل على 5% من قيمتها كنقاط مجانية</p>
            <div class="points-info">
                <i class="fas fa-coins"></i> كل $1 = 5 نقاط
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">الكل</button>
            <button class="filter-btn" onclick="filterProducts('electronics')">إلكترونيات</button>
            <button class="filter-btn" onclick="filterProducts('fashion')">ملابس</button>
            <button class="filter-btn" onclick="filterProducts('gaming')">ألعاب</button>
            <button class="filter-btn" onclick="filterProducts('accessories')">إكسسوارات</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="cart-toggle" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <div class="cart-sidebar" id="cartSidebar" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h2 class="cart-title"><i class="fas fa-shopping-cart"></i> سلة المشتريات</h2>
            <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total">
            <div class="cart-total-row">
                <span>المجموع:</span>
                <span id="cartSubtotal">$0</span>
            </div>
            <div class="cart-total-row">
                <span>النقاط المكتسبة:</span>
                <span id="cartPoints" style="color: var(--gold);">+0</span>
            </div>
            <div class="cart-total-row final">
                <span>الإجمالي:</span>
                <span id="cartTotal">$0</span>
            </div>
        </div>
        <button class="checkout-btn" onclick="checkout()">
            <i class="fas fa-credit-card"></i> إتمام الشراء
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: 'آيفون 15 برو ماكس', desc: 'أحدث هاتف من آبل بقدرات مذهلة', price: 1200, category: 'electronics', icon: '📱' },
            { id: 2, name: 'ماكبوك برو 14', desc: 'لابتوب احترافي للمبدعين', price: 2000, category: 'electronics', icon: '💻' },
            { id: 3, name: 'آيباد برو 12.9', desc: 'أجهزة لوحية قوية', price: 1100, category: 'electronics', icon: '📱' },
            { id: 4, name: 'ساعة أبل ألترا 2', desc: 'ساعة ذكية متينة', price: 800, category: 'accessories', icon: '⌚' },
            { id: 5, name: 'سماعات AirPods Pro', desc: 'سماعات_noise cancelling', price: 250, category: 'electronics', icon: '🎧' },
            { id: 6, name: 'بلايستيشن 5', desc: 'أحدث جهاز ألعاب', price: 500, category: 'gaming', icon: '🎮' },
            { id: 7, name: 'إكس بوكس سيريس X', desc: 'أجهزة ألعاب قوية', price: 500, category: 'gaming', icon: '🎮' },
            { id: 8, name: 'نيتندو سويتش أوليد', desc: 'جهاز ألعاب محمول', price: 350, category: 'gaming', icon: '🎮' },
            { id: 9, name: 'حقيبة جلد فاخرة', desc: 'حقيبة يدوية أنيقة', price: 300, category: 'fashion', icon: '👜' },
            { id: 10, name: 'نظارات شمسية راي بان', desc: 'نظارات أنيقة', price: 200, category: 'accessories', icon: '🕶️' },
            { id: 11, name: 'ساعة رولكس', desc: 'ساعة فاخرة', price: 15000, category: 'accessories', icon: '⌚' },
            { id: 12, name: 'حاسوب ريجيد', desc: 'PC جaming قوي', price: 3000, category: 'electronics', icon: '🖥️' }
        ];

        let cart = [];

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

            grid.innerHTML = filtered.map(product => {
                const points = Math.floor(product.price * 0.05 * 100); // 5% in points (cents)
                return `
                    <div class="product-card">
                        <div class="product-badge">-${Math.floor(20 + Math.random() * 30)}%</div>
                        <div class="product-image">${product.icon}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-desc">${product.desc}</p>
                        <div class="product-price">
                            <span class="price-original">$${(product.price * 1.3).toFixed(0)}</span>
                            <span class="price-current">$${product.price}</span>
                        </div>
                        <div class="points-earned">
                            <i class="fas fa-coins"></i> اكسب <span>${points}</span> نقطة
                        </div>
                        <button class="product-btn" onclick="addToCart(${product.id})">
                            <i class="fas fa-cart-plus"></i> أضف للسلة
                        </button>
                    </div>
                `;
            }).join('');
        }

        function filterProducts(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!cart.find(item => item.id === id)) {
                cart.push(product);
                updateCart();
                toggleCart(true);
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        function updateCart() {
            const badge = document.getElementById('cartBadge');
            const itemsContainer = document.getElementById('cartItems');
            const subtotal = document.getElementById('cartSubtotal');
            const pointsEl = document.getElementById('cartPoints');
            const total = document.getElementById('cartTotal');

            badge.textContent = cart.length;

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;"><i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom: 1rem;"></i><p>السلة فارغة</p></div>';
                subtotal.textContent = '$0';
                pointsEl.textContent = '+0';
                total.textContent = '$0';
                return;
            }

            itemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-icon">${item.icon}</div>
                        <div>
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price}</div>
                        </div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
            const totalPoints = Math.floor(totalPrice * 0.05 * 100);

            subtotal.textContent = '$' + totalPrice;
            pointsEl.textContent = '+' + totalPoints + ' نقطة';
            total.textContent = '$' + totalPrice;
        }

        function toggleCart(open = null) {
            const sidebar = document.getElementById('cartSidebar');
            const panel = document.getElementById('cartPanel');
            
            if (open === true) {
                sidebar.style.display = 'block';
                panel.classList.add('open');
            } else if (open === false) {
                sidebar.style.display = 'none';
                panel.classList.remove('open');
            } else {
                sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
                panel.classList.toggle('open');
            }
        }

        async function checkout() {
            if (cart.length === 0) {
                alert('السلة فارغة!');
                return;
            }

            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
            const confirmMsg = `سيتم خصم $${totalPrice} من رصيدك. هل تريد المتابعة؟`;
            
            if (!confirm(confirmMsg)) return;

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('سجل دخول أولاً!');
                    window.location.href = '/login';
                    return;
                }

                const res = await fetch('http://localhost:3000/api/orders/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ items: cart.map(i => i.id) })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(`🎉 تم الشراء بنجاح!\nاكسبت ${data.pointsEarned || 0} نقطة!`);
                    cart = [];
                    updateCart();
                    toggleCart(false);
                    loadUserData();
                } else {
                    alert(data.error || 'خطأ في الشراء');
                }
            } catch (e) {
                alert('خطأ في الاتصال');
            }
        }

        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userPoints').textContent = user.points || 0;
                }
            } catch (e) { console.error(e); }
        }

        renderProducts();
        loadUserData();
    </script>
</body>
</html>
