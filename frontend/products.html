<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 المنتجات - PuzzleChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --secondary: #10b981;
      --secondary-dark: #059669;
      --gold: #f59e0b;
      --gold-light: #fbbf24;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-secondary: #1e293b;
      --dark-tertiary: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dark: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* Animated Background */
    .bg-animation { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      z-index: -1; 
      overflow: hidden;
    }
    .bg-animation::before { 
      content: ''; 
      position: absolute; 
      width: 200%; 
      height: 200%; 
      background: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(245, 158, 11, 0.1) 0%, transparent 40%);
      animation: bgMove 20s ease-in-out infinite; 
    }
    .floating-shapes { position: absolute; inset: 0; overflow: hidden; }
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
      animation: floatShape 15s ease-in-out infinite;
    }
    .shape-1 { width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
    .shape-2 { width: 200px; height: 200px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: -5s; }
    .shape-3 { width: 150px; height: 150px; background: var(--gold); top: 50%; right: 20%; animation-delay: -10s; }

    @keyframes bgMove { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }
    @keyframes floatShape { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }

    /* Navbar */
    .navbar { 
      background: rgba(15, 23, 42, 0.85); 
      backdrop-filter: blur(20px); 
      border-bottom: 1px solid rgba(255,255,255,0.08); 
      padding: 0.875rem 2rem; 
      position: fixed; 
      top: 0; 
      width: 100%; 
      z-index: 1000;
      transition: all 0.3s ease;
    }
    .navbar.scrolled { padding: 0.5rem 2rem; background: rgba(15, 23, 42, 0.95); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
    .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { 
      font-size: 1.5rem; 
      font-weight: 900; 
      background: linear-gradient(135deg, var(--primary-light), var(--secondary)); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.3s;
    }
    .logo:hover { transform: scale(1.05); }
    .logo i { -webkit-text-fill-color: var(--primary); }
    .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .nav-link { 
      color: var(--text-muted); 
      text-decoration: none; 
      font-weight: 600; 
      padding: 0.625rem 1rem; 
      border-radius: 12px; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: all 0.3s;
      transform: translateX(-50%);
    }
    .nav-link:hover, .nav-link.active { color: var(--text); }
    .nav-link:hover::after, .nav-link.active::after { width: 60%; }
    .nav-link.active { background: rgba(99, 102, 241, 0.15); }

    .balance-badge { 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
      padding: 0.5rem 1.25rem; 
      border-radius: 50px; 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .balance-badge:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
    .balance-badge i { color: var(--gold-light); }

    /* Main Container */
    .container { max-width: 1400px; margin: 0 auto; padding: 7rem 2rem 2rem; }

    /* Page Header */
    .page-header { 
      text-align: center; 
      margin-bottom: 3rem; 
      animation: fadeInUp 0.8s ease;
    }
    .page-title { 
      font-size: 3rem; 
      font-weight: 900; 
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-title i { 
      -webkit-text-fill-color: var(--secondary);
      animation: bounce 2s ease-in-out infinite;
    }
    .page-subtitle { 
      color: var(--text-muted); 
      font-size: 1.25rem; 
      margin-bottom: 1.5rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .points-info { 
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(16, 185, 129, 0.15); 
      padding: 0.875rem 1.75rem; 
      border-radius: 50px; 
      color: var(--secondary); 
      font-weight: 700;
      border: 1px solid rgba(16, 185, 129, 0.3);
      transition: all 0.3s;
    }
    .points-info:hover { background: rgba(16, 185, 129, 0.25); transform: scale(1.02); }
    .points-info i { animation: spin 3s linear infinite; }

    /* Search & Filters */
    .search-filters { 
      display: flex; 
      gap: 1rem; 
      justify-content: center; 
      flex-wrap: wrap; 
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease 0.2s backwards;
    }
    .search-box { 
      position: relative; 
      flex: 1; 
      max-width: 450px;
    }
    .search-box input { 
      width: 100%; 
      padding: 1rem 1rem 1rem 3.5rem; 
      background: rgba(255,255,255,0.05); 
      border: 2px solid rgba(255,255,255,0.1); 
      border-radius: 16px; 
      color: var(--text); 
      font-size: 1rem;
      transition: all 0.3s;
    }
    .search-box input:focus { 
      outline: none; 
      border-color: var(--primary); 
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    .search-box i { 
      position: absolute; 
      left: 1.25rem; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--text-muted);
      transition: all 0.3s;
    }
    .search-box input:focus + i { color: var(--primary); }

    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .filter-btn { 
      padding: 0.75rem 1.5rem; 
      background: rgba(255,255,255,0.05); 
      border: 2px solid rgba(255,255,255,0.1); 
      border-radius: 12px; 
      color: var(--text-muted); 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn:hover { 
      background: rgba(99, 102, 241, 0.15); 
      border-color: rgba(99, 102, 241, 0.3);
      color: var(--text);
      transform: translateY(-2px);
    }
    .filter-btn.active { 
      background: var(--primary); 
      border-color: var(--primary); 
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    .sort-select { 
      padding: 0.75rem 1.5rem; 
      background: rgba(255,255,255,0.05); 
      border: 2px solid rgba(255,255,255,0.1); 
      border-radius: 12px; 
      color: var(--text); 
      font-size: 1rem; 
      cursor: pointer;
      transition: all 0.3s;
    }
    .sort-select:focus { border-color: var(--primary); outline: none; }

    /* Products Grid */
    .products-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 1.5rem; 
    }

    /* Product Card */
    .product-card { 
      background: var(--dark-secondary); 
      border-radius: 24px; 
      padding: 1.5rem; 
      border: 2px solid rgba(255,255,255,0.05); 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      overflow: hidden; 
      position: relative;
      animation: fadeInUp 0.6s ease backwards;
    }
    .product-card:nth-child(1) { animation-delay: 0.1s; }
    .product-card:nth-child(2) { animation-delay: 0.15s; }
    .product-card:nth-child(3) { animation-delay: 0.2s; }
    .product-card:nth-child(4) { animation-delay: 0.25s; }
    .product-card:nth-child(5) { animation-delay: 0.3s; }
    .product-card:nth-child(6) { animation-delay: 0.35s; }

    .product-card:hover { 
      transform: translateY(-8px) scale(1.02); 
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border-color: rgba(99, 102, 241, 0.3);
    }
    .product-card::before { 
      content: ''; 
      position: absolute; 
      top: 0; 
      left: 0; 
      right: 0; 
      height: 4px; 
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--gold));
      transform: scaleX(0);
      transition: transform 0.4s;
    }
    .product-card:hover::before { transform: scaleX(1); }

    .product-badges { position: absolute; top: 1rem; left: 1rem; right: 1rem; display: flex; justify-content: space-between; z-index: 2; }
    .product-badge { 
      padding: 0.375rem 0.875rem; 
      border-radius: 20px; 
      font-size: 0.75rem; 
      font-weight: 700;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s;
    }
    .product-card:hover .product-badge { opacity: 1; transform: translateY(0); }
    .product-badge.discount { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .product-badge.new { background: linear-gradient(135deg, var(--secondary), #059669); color: white; }

    .product-image { 
      width: 100%; 
      height: 180px; 
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); 
      border-radius: 16px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 4rem; 
      margin-bottom: 1rem;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
    }
    .product-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 100%);
    }
    .product-card:hover .product-image { 
      transform: scale(1.08) rotate(2deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .product-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      opacity: 0;
      transform: translateX(10px);
      transition: all 0.3s;
    }
    .product-card:hover .product-actions { opacity: 1; transform: translateX(0); }
    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .action-btn:hover { background: var(--primary); transform: scale(1.1); }
    .action-btn.wishlist:hover { background: var(--danger); }

    .product-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; transition: color 0.3s; }
    .product-card:hover .product-name { color: var(--primary-light); }
    .product-desc { 
      color: var(--text-muted); 
      font-size: 0.875rem; 
      margin-bottom: 1rem; 
      height: 40px; 
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .product-price { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 0.75rem;
    }
    .price-original { 
      text-decoration: line-through; 
      color: var(--text-muted); 
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .price-current { 
      font-size: 1.75rem; 
      font-weight: 900; 
      background: linear-gradient(135deg, var(--secondary), #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .points-earned { 
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1)); 
      padding: 0.625rem 1rem; 
      border-radius: 12px; 
      text-align: center; 
      margin-bottom: 1rem;
      border: 1px solid rgba(245, 158, 11, 0.2);
      transition: all 0.3s;
    }
    .points-earned:hover { background: rgba(245, 158, 11, 0.25); }
    .points-earned span { 
      color: var(--gold-light); 
      font-weight: 800;
      font-size: 1.1rem;
    }

    .product-btn { 
      width: 100%; 
      padding: 1rem; 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
      border: none; 
      border-radius: 14px; 
      color: white; 
      font-weight: 700; 
      font-size: 1rem;
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .product-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .product-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .product-btn:hover::before { transform: translateX(100%); }
    .product-btn:active { transform: scale(0.98); }

    /* Cart Toggle */
    .cart-toggle { 
      position: fixed; 
      bottom: 2rem; 
      left: 2rem; 
      width: 65px; 
      height: 65px; 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.5rem; 
      color: white; 
      cursor: pointer; 
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); 
      z-index: 1000;
      transition: all 0.3s;
      animation: pulse 2s ease-in-out infinite;
    }
    .cart-toggle:hover { transform: scale(1.1) rotate(5deg); }
    .cart-toggle i { transition: transform 0.3s; }
    .cart-toggle:hover i { transform: rotate(15deg); }
    .cart-badge { 
      position: absolute; 
      top: -5px; 
      right: -5px; 
      background: linear-gradient(135deg, var(--danger), #dc2626); 
      width: 26px; 
      height: 26px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 0.8rem; 
      font-weight: 800;
      animation: bounceIn 0.3s ease;
    }

    /* Cart Panel */
    .cart-sidebar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.7); 
      backdrop-filter: blur(5px);
      z-index: 2000; 
      display: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cart-sidebar.open { display: block; opacity: 1; }
    .cart-panel { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 420px; 
      max-width: 100%; 
      height: 100%; 
      background: var(--dark-secondary); 
      z-index: 2001; 
      transform: translateX(-100%); 
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 2rem;
      overflow-y: auto;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    .cart-panel.open { transform: translateX(0); }
    .cart-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .cart-title { 
      font-size: 1.5rem; 
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cart-title i { color: var(--primary); }
    .cart-close { 
      background: rgba(255,255,255,0.1); 
      border: none; 
      color: var(--text); 
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 1.25rem; 
      cursor: pointer;
      transition: all 0.3s;
    }
    .cart-close:hover { background: var(--danger); transform: rotate(90deg); }

    .cart-items { 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      margin-bottom: 1.5rem;
      min-height: 200px;
    }
    .cart-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 1rem; 
      background: rgba(255,255,255,0.05); 
      border-radius: 16px;
      animation: slideIn 0.3s ease;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s;
    }
    .cart-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
    .cart-item-info { display: flex; align-items: center; gap: 1rem; flex: 1; }
    .cart-item-icon { 
      font-size: 2.5rem;
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item-name { font-weight: 700; margin-bottom: 0.25rem; }
    .cart-item-price { color: var(--secondary); font-weight: 700; }
    .cart-item-remove { 
      background: rgba(239, 68, 68, 0.15); 
      border: none; 
      color: var(--danger); 
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cart-item-remove:hover { background: var(--danger); color: white; transform: scale(1.1); }

    .cart-total { 
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); 
      padding: 1.5rem; 
      border-radius: 16px; 
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .cart-total-row { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 0.75rem;
      font-size: 1rem;
    }
    .cart-total-row.final { 
      font-size: 1.5rem; 
      font-weight: 800;
      border-top: 2px solid rgba(255,255,255,0.1);
      padding-top: 0.75rem;
      margin-top: 0.5rem;
    }
    .cart-total-row span:last-child { color: var(--secondary); }

    .checkout-btn { 
      width: 100%; 
      padding: 1.25rem; 
      background: linear-gradient(135deg, var(--secondary), #059669); 
      border: none; 
      border-radius: 16px; 
      color: white; 
      font-size: 1.2rem; 
      font-weight: 800; 
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .checkout-btn:hover { 
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
    }

    /* Empty Cart */
    .empty-cart { 
      text-align: center; 
      color: var(--text-muted); 
      padding: 3rem 1rem;
      animation: fadeIn 0.5s ease;
    }
    .empty-cart i { 
      font-size: 4rem; 
      margin-bottom: 1rem;
      opacity: 0.5;
      animation: float 3s ease-in-out infinite;
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 4000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast { 
      background: var(--dark-secondary);
      padding: 1rem 1.5rem;
      border-radius: 14px;
      border-right: 4px solid var(--secondary);
      transform: translateX(150%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .toast.show { transform: translateX(0); }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--secondary); }
    .toast.info { border-color: var(--primary); }

    /* Loading */
    .loading { 
      display: flex; 
      justify-content: center; 
      padding: 3rem; 
      grid-column: 1 / -1;
    }
    .loading i { 
      font-size: 2.5rem; 
      color: var(--primary); 
      animation: spin 1s linear infinite;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from opacity: 0; to opacity: 1; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 10px 40px rgba(99, 102, 241, 0.6); } }
    @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar-content { flex-direction: column; padding: 0.5rem 1rem; }
      .nav-links { order: 3; width: 100%; justify-content: center; }
      .page-title { font-size: 2rem; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .product-card { padding: 1rem; }
      .product-image { height: 120px; font-size: 2.5rem; }
      .cart-toggle { bottom: 1rem; left: 1rem; width: 55px; height: 55px; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="navbar-content">
      <div class="logo"><i class="fas fa-gift"></i> PuzzleChain</div>
      <div class="nav-links">
        <a href="/" class="nav-link">🏠 الرئيسية</a>
        <a href="/products" class="nav-link active">🛒 المنتجات</a>
        <a href="/boxes" class="nav-link">📦 الصناديق</a>
        <a href="/wallet" class="nav-link">💰 المحفظة</a>
        <div class="balance-badge" onclick="window.location.href='/wallet'">
          <i class="fas fa-coins"></i> 
          <span id="userPoints">0</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title animate__animated animate__fadeInUp"><i class="fas fa-shopping-bag"></i> المتجر</h1>
      <p class="page-subtitle">كل منتج تشتريه يمنحك نقاط مجانية لفتح الصناديق المميزة! 🎁</p>
      <div class="points-info">
        <i class="fas fa-coins"></i> 
        <span>كل $1 يمنحك 5 نقاط مجانية!</span>
      </div>
    </div>

    <div class="search-filters">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتجات...">
        <i class="fas fa-search"></i>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterProducts('all')">
          <i class="fas fa-th"></i> الكل
        </button>
        <button class="filter-btn" onclick="filterProducts('electronics')">
          <i class="fas fa-mobile-alt"></i> إلكترونيات
        </button>
        <button class="filter-btn" onclick="filterProducts('fashion')">
          <i class="fas fa-tshirt"></i> ملابس
        </button>
        <button class="filter-btn" onclick="filterProducts('gaming')">
          <i class="fas fa-gamepad"></i> ألعاب
        </button>
        <button class="filter-btn" onclick="filterProducts('accessories')">
          <i class="fas fa-gem"></i> إكسسوارات
        </button>
      </div>
      <select class="sort-select" onchange="sortProducts(this.value)">
        <option value="default">📊 الترتيب الافتراضي</option>
        <option value="price-low">💵 السعر: من الأقل</option>
        <option value="price-high">💰 السعر: من الأعلى</option>
        <option value="points">⭐ الأكثر ربحية</option>
      </select>
    </div>

    <div class="products-grid" id="productsGrid">
      <div class="loading"><i class="fas fa-spinner"></i></div>
    </div>
  </div>

  <div class="cart-toggle" onclick="toggleCart()">
    <i class="fas fa-shopping-cart"></i>
    <div class="cart-badge" id="cartBadge">0</div>
  </div>

  <div class="cart-sidebar" id="cartSidebar" onclick="toggleCart()"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2 class="cart-title"><i class="fas fa-shopping-cart"></i> سلة المشتريات</h2>
      <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="empty-cart">
        <i class="fas fa-shopping-basket"></i>
        <p>السلة فارغة تماماً! 🛒</p>
        <small>أضف منتجات للبدء</small>
      </div>
    </div>
    <div class="cart-total">
      <div class="cart-total-row"><span>المجموع الفرعي</span><span id="cartSubtotal">$0</span></div>
      <div class="cart-total-row"><span>النقاط المكتسبة</span><span id="cartPoints" style="color: var(--gold);">+0 نقطة</span></div>
      <div class="cart-total-row final"><span>الإجمالي</span><span id="cartTotal">$0</span></div>
    </div>
    <button class="checkout-btn" onclick="checkout()">
      <i class="fas fa-credit-card"></i> إتمام الشراء
    </button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const products = [
      { id: 1, name: 'آيفون 15 برو ماكس', desc: 'أحدث إصدار من آبل بشاشة سوبر ريتينا XDR مقاس 6.7 بوصة', price: 1200, category: 'electronics', icon: '📱', isNew: true },
      { id: 2, name: 'جالكسي S24 ألترا', desc: 'هاتف سامسونج الرائد بكاميرا 200 ميجابيكسل وزوم 100x', price: 2000, category: 'electronics', icon: '📱' },
      { id: 3, name: 'ماكبوك برو 16', desc: 'لابتوب ابل بمعالج M3 Pro وشاشة Liquid Retina XDR', price: 1100, category: 'electronics', icon: '💻' },
      { id: 4, name: 'airedrops Pro', desc: 'سماعات لاسلكية متقدمة مع إلغاء الضوضاء النشط', price: 800, category: 'accessories', icon: '🎧', isNew: true },
      { id: 5, name: 'AirPods Pro 2', desc: 'سماعات ابل اللاسلكية مع شريحة H2', price: 250, category: 'electronics', icon: '🎧' },
      { id: 6, name: 'بلايستيشن 5', desc: 'جهاز ألعاب الجيل الخامس مع قرص 825GB', price: 500, category: 'gaming', icon: '🎮', isNew: true },
      { id: 7, name: 'إكس بوكس سيريس X', desc: 'جهاز ألعاب مايكروسوفت بدقة 4K', price: 500, category: 'gaming', icon: '🎮' },
      { id: 8, name: 'نينتندو سويتش', desc: 'جهاز ألعاب نينتندو المحمول والشاشة', price: 350, category: 'gaming', icon: '🎮' },
      { id: 9, name: 'ساعة أبل ألترا 2', desc: 'ساعة ذكية متينة بمقاومة الماء حتى 100م', price: 300, category: 'fashion', icon: '⌚' },
      { id: 10, name: 'حذاء نايك جوردان', desc: 'حذاء رياضي أنيق ومريح بتصميم كلاسيكي', price: 200, category: 'fashion', icon: '👟' },
      { id: 11, name: 'حقيبة لوي فيتون', desc: 'حقيبة فاخرة يدوية الصنع من الجلد الطبيعي', price: 1500, category: 'accessories', icon: '👜', isNew: true },
      { id: 12, name: 'PC جيمينغ', desc: 'كمبيوتر ألعاب بمعالج Intel i9 وكرت RTX 4090', price: 3000, category: 'electronics', icon: '🖥️' }
    ];

    let cart = [];
    let currentFilter = 'all';
    let currentSort = 'default';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
      loadUserData();
      initScrollEffects();
    });

    // Navbar scroll effect
    function initScrollEffects() {
      window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      });
    }

    function renderProducts(filter = 'all', search = '') {
      const grid = document.getElementById('productsGrid');
      
      setTimeout(() => {
        let filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
        
        if (search) {
          filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(search.toLowerCase()) || 
            p.desc.toLowerCase().includes(search.toLowerCase())
          );
        }

        if (currentSort === 'price-low') filtered.sort((a, b) => a.price - b.price);
        else if (currentSort === 'price-high') filtered.sort((a, b) => b.price - a.price);
        else if (currentSort === 'points') filtered.sort((a, b) => (b.price * 0.05) - (a.price * 0.05));

        if (filtered.length === 0) {
          grid.innerHTML = `
            <div class="empty-cart" style="grid-column: 1/-1;">
              <i class="fas fa-search"></i>
              <p>لا توجد منتجات!</p>
              <small>جرب فلتر آخر</small>
            </div>
          `;
          return;
        }

        grid.innerHTML = filtered.map((product, index) => {
          const points = Math.floor(product.price * 0.05 * 100);
          const discount = Math.floor(20 + Math.random() * 30);
          return `
            <div class="product-card" style="animation-delay: ${index * 0.05}s">
              <div class="product-badges">
                <span class="product-badge new">${product.isNew ? 'جديد 🔥' : ''}</span>
                <span class="product-badge discount">-${discount}%</span>
              </div>
              <div class="product-actions">
                <button class="action-btn wishlist" onclick="addToWishlist(${product.id})" title="المفضلة">
                  <i class="fas fa-heart"></i>
                </button>
                <button class="action-btn" onclick="quickView(${product.id})" title="عرض سريع">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="product-image">${product.icon}</div>
              <h3 class="product-name">${product.name}</h3>
              <p class="product-desc">${product.desc}</p>
              <div class="product-price">
                <span class="price-original">$${Math.floor(product.price * 1.3)}</span>
                <span class="price-current">$${product.price}</span>
              </div>
              <div class="points-earned">
                <i class="fas fa-coins"></i> +${points} <span>نقطة</span>
              </div>
              <button class="product-btn" onclick="addToCart(${product.id})">
                <i class="fas fa-cart-plus"></i> إضافة للسلة
              </button>
            </div>
          `;
        }).join('');
      }, 300);
    }

    function filterProducts(category) {
      currentFilter = category;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderProducts(category, document.getElementById('searchInput').value);
    }

    function sortProducts(value) {
      currentSort = value;
      renderProducts(currentFilter, document.getElementById('searchInput').value);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderProducts(currentFilter, e.target.value);
    });

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!cart.find(item => item.id === id)) {
        cart.push(product);
        updateCart();
        toggleCart(true);
        showToast('✅ تم إضافة ' + product.name + ' للسلة', 'success');
      } else {
        showToast('⚠️ المنتج موجود بالفعل في السلة!', 'info');
      }
    }

    function addToWishlist(id) {
      const product = products.find(p => p.id === id);
      showToast('❤️ تم إضافة ' + product.name + ' للمفضلة', 'success');
    }

    function quickView(id) {
      const product = products.find(p => p.id === id);
      showToast('👀 عرض سريع لـ ' + product.name, 'info');
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      updateCart();
      showToast('🗑️ تم إزالة المنتج من السلة', 'info');
    }

    function updateCart() {
      const badge = document.getElementById('cartBadge');
      const itemsContainer = document.getElementById('cartItems');
      const subtotal = document.getElementById('cartSubtotal');
      const pointsEl = document.getElementById('cartPoints');
      const total = document.getElementById('cartTotal');

      badge.textContent = cart.length;

      if (cart.length === 0) {
        itemsContainer.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-basket"></i>
            <p>السلة فارغة تماماً! 🛒</p>
            <small>أضف منتجات للبدء</small>
          </div>
        `;
        subtotal.textContent = '$0';
        pointsEl.textContent = '+0 نقطة';
        total.textContent = '$0';
        return;
      }

      itemsContainer.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-icon">${item.icon}</div>
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">$${item.price}</div>
            </div>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `).join('');

      const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
      const totalPoints = Math.floor(totalPrice * 0.05 * 100);

      subtotal.textContent = '$' + totalPrice.toLocaleString();
      pointsEl.textContent = '+' + totalPoints.toLocaleString() + ' نقطة';
      total.textContent = '$' + totalPrice.toLocaleString();
    }

    function toggleCart(open = null) {
      const sidebar = document.getElementById('cartSidebar');
      const panel = document.getElementById('cartPanel');
      
      if (open === true) {
        sidebar.style.display = 'block';
        setTimeout(() => sidebar.classList.add('open'), 10);
        panel.classList.add('open');
      } else if (open === false) {
        sidebar.classList.remove('open');
        panel.classList.remove('open');
        setTimeout(() => sidebar.style.display = 'none', 300);
      } else {
        if (sidebar.style.display === 'block') {
          sidebar.classList.remove('open');
          panel.classList.remove('open');
          setTimeout(() => sidebar.style.display = 'none', 300);
        } else {
          sidebar.style.display = 'block';
          setTimeout(() => sidebar.classList.add('open'), 10);
          panel.classList.add('open');
        }
      }
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    async function checkout() {
      if (cart.length === 0) {
        showToast('⚠️ السلة فارغة! أضف منتجات أولاً', 'error');
        return;
      }

      const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
      const confirmMsg = `سيتم خصم $${totalPrice} من رصيدك. هل تريد المتابعة؟`;

      if (!confirm(confirmMsg)) return;

      try {
        const token = localStorage.getItem('token');
        if (!token) {
          showToast('يرجى تسجيل الدخول أولاً!', 'error');
          window.location.href = '/login';
          return;
        }

        const res = await fetch('http://localhost:3000/api/orders/create', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ items: cart.map(i => i.id) })
        });

        const data = await res.json();

        if (res.ok) {
          showToast(`🎉 تم الشراء بنجاح! حصلت على ${data.pointsEarned || 0} نقطة`, 'success');
          cart = [];
          updateCart();
          toggleCart(false);
          loadUserData();
        } else {
          showToast(data.error || 'فشل في الشراء!', 'error');
        }
      } catch (e) {
        showToast('حدث خطأ في الاتصال بالخادم!', 'error');
      }
    }

    async function loadUserData() {
      try {
        const token = localStorage.getItem('token');
        if (!token) return;

        const res = await fetch('http://localhost:3000/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
          const user = await res.json();
          document.getElementById('userPoints').textContent = (user.points || 0).toLocaleString();
        }
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
