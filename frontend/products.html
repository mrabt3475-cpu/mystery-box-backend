<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 المنتجات - PuzzleChain</title>
    
    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Critical CSS - Inline for faster render -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-secondary: #1e293b;
            --dark-tertiary: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; }
        .navbar { background: var(--dark-secondary); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--primary); }
        .balance-badge { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title { font-size: 2rem; font-weight: 700; display: flex; align-items: center; gap: 0.75rem; }
        .page-title i { color: var(--secondary); }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box input { width: 100%; background: var(--dark-secondary); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 12px; font-size: 1rem; }
        .search-box input:focus { outline: none; border-color: var(--primary); }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-btn { background: var(--dark-secondary); border: 1px solid var(--border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 500; transition: all 0.2s; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
        .product-card { background: var(--dark-secondary); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.2); }
        .product-image { position: relative; height: 180px; background: linear-gradient(135deg, var(--dark-tertiary), var(--dark)); display: flex; align-items: center; justify-content: center; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
        .product-image img.loaded { opacity: 1; }
        .product-badge { position: absolute; top: 0.75rem; right: 0.75rem; background: var(--secondary); color: white; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .product-badge.discount { background: var(--danger); }
        .product-info { padding: 1rem; }
        .product-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
        .product-description { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.75rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .current-price { font-size: 1.25rem; font-weight: 700; color: var(--secondary); }
        .original-price { font-size: 0.85rem; color: var(--text-muted); text-decoration: line-through; }
        .product-points { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--primary); padding: 0.35rem 0.75rem; border-radius: 8px; display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; margin-bottom: 0.75rem; }
        .product-points i { color: var(--secondary); }
        .product-stock { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.75rem; font-size: 0.8rem; }
        .stock-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--secondary); }
        .stock-indicator.low { background: #f59e0b; }
        .stock-indicator.out { background: var(--danger); }
        .buy-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; color: white; padding: 0.75rem; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .buy-btn:hover { transform: scale(1.02); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3); }
        .buy-btn:disabled { background: var(--dark-tertiary); cursor: not-allowed; transform: none; }
        .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--dark-tertiary); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 0.75rem; color: var(--dark-tertiary); }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--dark-secondary); border: 1px solid rgba(255,255,255,0.1); padding: 1rem 1.25rem; border-radius: 10px; display: flex; align-items: center; gap: 0.5rem; transform: translateX(150%); transition: transform 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-color: var(--secondary); }
        .toast.error { border-color: var(--danger); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal { background: var(--dark-secondary); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; max-width: 420px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-title { font-size: 1.25rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.25rem; cursor: pointer; }
        .modal-footer { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .modal-btn { flex: 1; padding: 0.6rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.cancel { background: var(--dark-tertiary); color: var(--text); }
        .modal-btn.confirm { background: var(--secondary); color: white; }
        @media (max-width: 600px) {
            .navbar-content { flex-direction: column; text-align: center; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
    
    <!-- Fonts - Deferred -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo"><i class="fas fa-gift"></i> PuzzleChain</div>
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="/products" class="nav-link active"><i class="fas fa-shopping-bag"></i> المنتجات</a>
                <a href="/boxes" class="nav-link"><i class="fas fa-box"></i> الصناديق</a>
                <a href="/wallet" class="nav-link"><i class="fas fa-wallet"></i> المحفظة</a>
                <div class="balance-badge"><i class="fas fa-coins"></i> <span id="userPoints">0</span> نقطة</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-shopping-bag"></i> المنتجات</h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث..." autocomplete="off">
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-category="all">الكل</button>
            <button class="filter-btn" data-category="phone">جوالات</button>
            <button class="filter-btn" data-category="laptop">أجهزة</button>
            <button class="filter-btn" data-category="watch">ساعات</button>
            <button class="filter-btn" data-category="gaming">ألعاب</button>
            <button class="filter-btn" data-category="accessories">إكسسوارات</button>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>

    <div class="modal-overlay" id="purchaseModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">تأكيد الشراء</h2>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeModal()">إلغاء</button>
                <button class="modal-btn confirm" onclick="confirmPurchase()">تأكيد</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
    // Optimized State - Using single object
    const state = {
        products: [],
        filteredProducts: [],
        currentCategory: 'all',
        selectedProduct: null,
        userPoints: 0,
        userBalance: 0,
        isLoading: false
    };

    const API_URL = 'http://localhost:3000/api';

    // Debounce utility
    const debounce = (fn, delay) => {
        let timeout;
        return (...args) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => fn(...args), delay);
        };
    };

    // Initialize immediately
    (function init() {
        loadUserData();
        loadProducts();
        setupFilters();
    })();

    // Load user data with caching
    async function loadUserData() {
        try {
            const token = localStorage.getItem('token');
            if (!token) return;

            const res = await fetch(`${API_URL}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                const user = await res.json();
                state.userPoints = user.points || 0;
                state.userBalance = user.balance || 0;
                document.getElementById('userPoints').textContent = state.userPoints;
            }
        } catch (e) { console.error('User load error:', e); }
    }

    // Load products with optimized request
    async function loadProducts() {
        try {
            const res = await fetch(`${API_URL}/product`);
            const data = await res.json();
            
            // Process data efficiently
            state.products = data.map(p => ({
                _id: p._id,
                name: p.name,
                description: p.description,
                price: p.price,
                originalPrice: p.price,
                image: p.image,
                stock: p.stock || 10,
                category: p.category || 'accessories',
                discount: 0
            }));

            state.filteredProducts = [...state.products];
            renderProducts();
        } catch (e) {
            console.error('Products load error:', e);
            document.getElementById('productsGrid').innerHTML = 
                '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>خطأ في التحميل</h3></div>';
        }
    }

    // Optimized render with document fragment
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        const len = state.filteredProducts.length;
        
        if (len === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><h3>لا توجد منتجات</h3></div>';
            return;
        }

        // Use template literal with join for better performance
        grid.innerHTML = state.filteredProducts.map(p => `
            <div class="product-card" data-category="${p.category}">
                <div class="product-image">
                    <img src="${p.image || 'https://via.placeholder.com/300x180?text=Product'}" 
                         alt="${p.name}" loading="lazy" onload="this.classList.add('loaded')"
                         onerror="this.src='https://via.placeholder.com/300x180?text=Product'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-description">${p.description || 'منتج عالي الجودة'}</p>
                    <div class="product-price">
                        <span class="current-price">$${p.price.toFixed(2)}</span>
                    </div>
                    <div class="product-points">
                        <i class="fas fa-coins"></i> +${Math.floor(p.price * 0.05)} نقطة
                    </div>
                    <div class="product-stock">
                        <span class="stock-indicator ${p.stock < 5 ? 'low' : ''} ${p.stock === 0 ? 'out' : ''}"></span>
                        <span>المخزون: ${p.stock}</span>
                    </div>
                    <button class="buy-btn" onclick="openPurchaseModal('${p._id}')" ${p.stock === 0 ? 'disabled' : ''}>
                        ${p.stock === 0 ? 'نفذت' : 'شراء'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    // Setup filters with event delegation
    function setupFilters() {
        const container = document.querySelector('.filters');
        
        container.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            
            container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            state.currentCategory = btn.dataset.category;
            filterProducts();
        });

        // Debounced search
        const searchHandler = debounce(() => filterProducts(), 200);
        document.getElementById('searchInput').addEventListener('input', searchHandler);
    }

    // Optimized filter function
    function filterProducts() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const cat = state.currentCategory;
        
        state.filteredProducts = state.products.filter(p => {
            const matchesCat = cat === 'all' || p.category === cat;
            const matchesSearch = !search || p.name.toLowerCase().includes(search);
            return matchesCat && matchesSearch;
        });

        renderProducts();
    }

    // Open modal
    function openPurchaseModal(id) {
        state.selectedProduct = state.products.find(p => p._id === id);
        if (!state.selectedProduct) return;

        const points = Math.floor(state.selectedProduct.price * 0.05);
        
        document.getElementById('modalBody').innerHTML = `
            <div style="text-align:center">
                <img src="${state.selectedProduct.image || ''}" style="width:180px;border-radius:10px;margin-bottom:1rem">
                <h3>${state.selectedProduct.name}</h3>
                <p style="color:var(--text-muted);margin:0.5rem 0">${state.selectedProduct.price.toFixed(2)}$</p>
                <div style="background:var(--dark);padding:0.75rem;border-radius:10px">
                    <div style="display:flex;justify-content:space-between"><span>رصيدك:</span><span>$${state.userBalance.toFixed(2)}</span></div>
                    <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.5rem">
                        <span>ستحصل على:</span><span style="color:var(--secondary)"><i class="fas fa-coins"></i> ${points} نقطة</span>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('purchaseModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('purchaseModal').classList.remove('show');
        state.selectedProduct = null;
    }

    async function confirmPurchase() {
        if (!state.selectedProduct) return;

        const token = localStorage.getItem('token');
        if (!token) { showToast('سجل دخول أولاً', 'error'); return; }

        try {
            const res = await fetch(`${API_URL}/purchase`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ productId: state.selectedProduct._id })
            });

            const data = await res.json();

            if (res.ok) {
                showToast(`تم! +${data.pointsAdded || 0} نقطة`, 'success');
                state.userBalance = data.balance;
                state.userPoints = data.points;
                document.getElementById('userPoints').textContent = state.userPoints;
                closeModal();
            } else {
                showToast(data.error || 'خطأ', 'error');
            }
        } catch (e) {
            showToast('خطأ في الاتصال', 'error');
        }
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.className = `toast ${type} show`;
        toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
        document.getElementById('toastMessage').textContent = msg;
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('purchaseModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
    });
    </script>
</body>
</html>
