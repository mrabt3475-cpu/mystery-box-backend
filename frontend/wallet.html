<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 المحفظة - PuzzleChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --gold: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark-secondary: #1e293b; --dark-tertiary: #334155; --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-animation::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%); animation: bgMove 20s ease-in-out infinite; }
        @keyframes bgMove { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--text); background: rgba(99, 102, 241, 0.2); }
        .balance-badge { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 6rem 2rem 2rem; }

        .wallet-header { text-align: center; margin-bottom: 3rem; }
        .wallet-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .wallet-title i { color: var(--gold); }

        .balance-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .balance-card { background: var(--dark-secondary); border-radius: 20px; padding: 2rem; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .balance-card:hover { transform: translateY(-5px); }
        .balance-card.main { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; }
        .balance-card.income { border-color: var(--secondary); }
        .balance-card.expense { border-color: var(--danger); }

        .balance-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .balance-card.main .balance-icon { color: white; }
        .balance-card.income .balance-icon { color: var(--secondary); }
        .balance-card.expense .balance-icon { color: var(--danger); }

        .balance-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .balance-card.main .balance-label { color: rgba(255,255,255,0.8); }
        .balance-amount { font-size: 2.5rem; font-weight: 800; }
        .balance-card.main .balance-amount { color: white; }
        .balance-card.income .balance-amount { color: var(--secondary); }
        .balance-card.expense .balance-amount { color: var(--danger); }

        .stats-section { background: var(--dark-secondary); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .stats-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .stat-item { text-align: center; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .stat-icon { font-size: 2rem; margin-bottom: 0.75rem; }
        .stat-icon.boxes { color: var(--gold); }
        .stat-icon.wins { color: var(--secondary); }
        .stat-icon.points { color: var(--primary); }
        .stat-icon.rate { color: #ec4899; }
        .stat-value { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        .stat-label { color: var(--text-muted); font-size: 0.85rem; }

        .transactions-section { background: var(--dark-secondary); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .transactions-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }

        .transaction-list { display: flex; flex-direction: column; gap: 1rem; }
        .transaction-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 12px; transition: all 0.3s; }
        .transaction-item:hover { background: rgba(255,255,255,0.08); }
        .transaction-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; margin-right: 1rem; }
        .transaction-icon.purchase { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .transaction-icon.points { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }
        .transaction-icon.box { background: rgba(245, 158, 11, 0.2); color: var(--gold); }
        .transaction-info { flex: 1; }
        .transaction-title { font-weight: 600; margin-bottom: 0.25rem; }
        .transaction-date { font-size: 0.8rem; color: var(--text-muted); }
        .transaction-amount { font-weight: 700; font-size: 1.1rem; }
        .transaction-amount.positive { color: var(--secondary); }
        .transaction-amount.negative { color: var(--danger); }

        .empty-transactions { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-transactions i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

        @media (max-width: 768px) { .navbar-content { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo"><i class="fas fa-gift"></i> PuzzleChain</div>
            <div class="nav-links">
                <a href="/" class="nav-link">الرئيسية</a>
                <a href="/products" class="nav-link">المنتجات</a>
                <a href="/boxes" class="nav-link">الصناديق</a>
                <a href="/wallet" class="nav-link active">المحفظة</a>
                <div class="balance-badge"><i class="fas fa-coins"></i> <span id="userPoints">0</span> نقطة</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="wallet-header">
            <h1 class="wallet-title"><i class="fas fa-wallet"></i> محفظتك</h1>
        </div>

        <div class="balance-cards">
            <div class="balance-card main">
                <div class="balance-icon"><i class="fas fa-wallet"></i></div>
                <div class="balance-label">الرصيد الإجمالي</div>
                <div class="balance-amount">$<span id="totalBalance">0.00</span></div>
            </div>
            <div class="balance-card income">
                <div class="balance-icon"><i class="fas fa-arrow-trend-up"></i></div>
                <div class="balance-label">إجمالي الأرباح</div>
                <div class="balance-amount">$<span id="totalIncome">0.00</span></div>
            </div>
            <div class="balance-card expense">
                <div class="balance-icon"><i class="fas fa-arrow-trend-down"></i></div>
                <div class="balance-label">إجمالي المصروفات</div>
                <div class="balance-amount">$<span id="totalExpense">0.00</span></div>
            </div>
        </div>

        <div class="stats-section">
            <h2 class="stats-title"><i class="fas fa-chart-bar"></i> إحصائياتك</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon boxes"><i class="fas fa-box-open"></i></div>
                    <div class="stat-value" id="boxesOpened">0</div>
                    <div class="stat-label">صندوق تم فتحه</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon wins"><i class="fas fa-trophy"></i></div>
                    <div class="stat-value" id="totalWins">0</div>
                    <div class="stat-label">عدد الجوائز</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon points"><i class="fas fa-coins"></i></div>
                    <div class="stat-value" id="totalPointsEarned">0</div>
                    <div class="stat-label">نقاط مكتسبة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon rate"><i class="fas fa-percent"></i></div>
                    <div class="stat-value" id="winRate">0%</div>
                    <div class="stat-label">نسبة الفوز</div>
                </div>
            </div>
        </div>

        <div class="transactions-section">
            <h2 class="transactions-title"><i class="fas fa-history"></i> последние операции</h2>
            <div class="transaction-list" id="transactionList">
                <div class="empty-transactions">
                    <i class="fas fa-receipt"></i>
                    <p>لا توجد معاملات بعد</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadWalletData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userPoints').textContent = user.points || 0;
                    document.getElementById('totalBalance').textContent = (user.balance || 0).toFixed(2);
                    document.getElementById('totalIncome').textContent = (user.totalIncome || 0).toFixed(2);
                    document.getElementById('totalExpense').textContent = (user.totalExpense || 0).toFixed(2);
                    document.getElementById('boxesOpened').textContent = user.boxesOpened || 0;
                    document.getElementById('totalWins').textContent = user.totalWins || 0;
                    document.getElementById('totalPointsEarned').textContent = user.totalPointsEarned || 0;
                    
                    const winRate = user.boxesOpened > 0 ? 
                        Math.round((user.totalWins / user.boxesOpened) * 100) : 0;
                    document.getElementById('winRate').textContent = winRate + '%';
                }
            } catch (e) { console.error(e); }
        }

        loadWalletData();
    </script>
</body>
</html>
