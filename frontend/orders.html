<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧾 الطلبات - PuzzleChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #10b981; --gold: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark-secondary: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); min-height: 100vh; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-animation::before { content: ''; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%); animation: bgMove 20s ease-in-out infinite; }
        @keyframes bgMove { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .navbar-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--text); background: rgba(99, 102, 241, 0.2); }
        .balance-badge { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 6rem 2rem 2rem; }

        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .page-title i { color: var(--primary); }
        .page-subtitle { color: var(--text-muted); font-size: 1.1rem; }

        .orders-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .order-stat { background: var(--dark-secondary); padding: 1.5rem; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .order-stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .order-stat-value { font-size: 1.75rem; font-weight: 700; }
        .order-stat-label { color: var(--text-muted); font-size: 0.85rem; }

        .orders-section { background: var(--dark-secondary); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .orders-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }

        .orders-list { display: flex; flex-direction: column; gap: 1rem; }

        .order-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; transition: all 0.3s; }
        .order-card:hover { background: rgba(255,255,255,0.08); }

        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .order-id { font-weight: 700; font-size: 1.1rem; }
        .order-date { color: var(--text-muted); font-size: 0.85rem; }
        .order-status { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .order-status.pending { background: rgba(245, 158, 11, 0.2); color: var(--gold); }
        .order-status.processing { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .order-status.shipped { background: rgba(6, 182, 212, 0.2); color: #06b6d4; }
        .order-status.delivered { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }

        .order-timeline { display: flex; justify-content: space-between; position: relative; margin: 1.5rem 0; padding: 0 1rem; }
        .order-timeline::before { content: ''; position: absolute; top: 15px; left: 10%; right: 10%; height: 3px; background: rgba(255,255,255,0.1); }
        .timeline-step { text-align: center; position: relative; z-index: 1; }
        .timeline-icon { width: 35px; height: 35px; border-radius: 50%; background: var(--dark-tertiary); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; color: var(--text-muted); }
        .timeline-step.completed .timeline-icon { background: var(--secondary); color: white; }
        .timeline-step.active .timeline-icon { background: var(--primary); color: white; }
        .timeline-label { font-size: 0.75rem; color: var(--text-muted); }
        .timeline-step.completed .timeline-label { color: var(--secondary); }
        .timeline-step.active .timeline-label { color: var(--primary); }

        .order-items { display: flex; flex-direction: column; gap: 0.75rem; }
        .order-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .order-item-icon { font-size: 1.5rem; }
        .order-item-info { flex: 1; }
        .order-item-name { font-weight: 600; }
        .order-item-price { color: var(--secondary); font-size: 0.9rem; }

        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .order-total-label { color: var(--text-muted); }
        .order-total-amount { font-size: 1.25rem; font-weight: 700; color: var(--secondary); }
        .order-points { color: var(--gold); font-weight: 600; }

        .empty-orders { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-orders i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

        @media (max-width: 768px) { .navbar-content { flex-direction: column; } .order-timeline { overflow-x: auto; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo"><i class="fas fa-gift"></i> PuzzleChain</div>
            <div class="nav-links">
                <a href="/" class="nav-link">الرئيسية</a>
                <a href="/products" class="nav-link">المنتجات</a>
                <a href="/orders" class="nav-link active">الطلبات</a>
                <a href="/wallet" class="nav-link">المحفظة</a>
                <div class="balance-badge"><i class="fas fa-coins"></i> <span id="userPoints">0</span> نقطة</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-clipboard-list"></i> طلباتك</h1>
            <p class="page-subtitle">تتبع جميع طلباتك وحالة الشحن</p>
        </div>

        <div class="orders-stats">
            <div class="order-stat">
                <div class="order-stat-icon" style="color: var(--primary);"><i class="fas fa-shopping-bag"></i></div>
                <div class="order-stat-value" id="totalOrders">0</div>
                <div class="order-stat-label">إجمالي الطلبات</div>
            </div>
            <div class="order-stat">
                <div class="order-stat-icon" style="color: var(--gold);"><i class="fas fa-clock"></i></div>
                <div class="order-stat-value" id="pendingOrders">0</div>
                <div class="order-stat-label">قيد الانتظار</div>
            </div>
            <div class="order-stat">
                <div class="order-stat-icon" style="color: var(--secondary);"><i class="fas fa-check-circle"></i></div>
                <div class="order-stat-value" id="deliveredOrders">0</div>
                <div class="order-stat-label">مُسلَّمة</div>
            </div>
            <div class="order-stat">
                <div class="order-stat-icon" style="color: var(--gold);"><i class="fas fa-coins"></i></div>
                <div class="order-stat-value" id="totalPoints">0</div>
                <div class="order-stat-label">نقاط مكتسبة</div>
            </div>
        </div>

        <div class="orders-section">
            <h2 class="orders-title"><i class="fas fa-boxes"></i> أحدث الطلبات</h2>
            <div class="orders-list" id="ordersList">
                <div class="empty-orders">
                    <i class="fas fa-box-open"></i>
                    <p>لا توجد طلبات بعد</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mockOrders = [
            {
                id: 'ORD-2026-001',
                date: '2026-03-27',
                status: 'delivered',
                items: [
                    { name: 'آيفون 15 برو ماكس', price: 1200, icon: '📱' },
                    { name: 'سماعات AirPods Pro', price: 250, icon: '🎧' }
                ],
                total: 1450,
                points: 7250
            },
            {
                id: 'ORD-2026-002',
                date: '2026-03-25',
                status: 'shipped',
                items: [
                    { name: 'بلايستيشن 5', price: 500, icon: '🎮' }
                ],
                total: 500,
                points: 2500
            },
            {
                id: 'ORD-2026-003',
                date: '2026-03-20',
                status: 'processing',
                items: [
                    { name: 'ساعة أبل ألترا 2', price: 800, icon: '⌚' }
                ],
                total: 800,
                points: 4000
            },
            {
                id: 'ORD-2026-004',
                date: '2026-03-15',
                status: 'pending',
                items: [
                    { name: 'آيباد برو 12.9', price: 1100, icon: '📱' }
                ],
                total: 1100,
                points: 5500
            }
        ];

        const statusSteps = {
            pending: 0,
            processing: 1,
            shipped: 2,
            delivered: 3
        };

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                list.innerHTML = '<div class="empty-orders"><i class="fas fa-box-open"></i><p>لا توجد طلبات بعد</p></div>';
                return;
            }

            list.innerHTML = orders.map(order => {
                const currentStep = statusSteps[order.status];
                
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">${order.id}</div>
                                <div class="order-date">${order.date}</div>
                            </div>
                            <div class="order-status ${order.status}">
                                ${order.status === 'pending' ? 'قيد الانتظار' : ''}
                                ${order.status === 'processing' ? 'قيد التجهيز' : ''}
                                ${order.status === 'shipped' ? 'تم الشحن' : ''}
                                ${order.status === 'delivered' ? 'مُسلَّم' : ''}
                            </div>
                        </div>

                        <div class="order-timeline">
                            <div class="timeline-step ${currentStep >= 0 ? 'completed' : ''} ${currentStep === 0 ? 'active' : ''}">
                                <div class="timeline-icon"><i class="fas fa-receipt"></i></div>
                                <div class="timeline-label">تم الطلب</div>
                            </div>
                            <div class="timeline-step ${currentStep >= 1 ? 'completed' : ''} ${currentStep === 1 ? 'active' : ''}">
                                <div class="timeline-icon"><i class="fas fa-cog"></i></div>
                                <div class="timeline-label">قيد التجهيز</div>
                            </div>
                            <div class="timeline-step ${currentStep >= 2 ? 'completed' : ''} ${currentStep === 2 ? 'active' : ''}">
                                <div class="timeline-icon"><i class="fas fa-truck"></i></div>
                                <div class="timeline-label">تم الشحن</div>
                            </div>
                            <div class="timeline-step ${currentStep >= 3 ? 'completed' : ''} ${currentStep === 3 ? 'active' : ''}">
                                <div class="timeline-icon"><i class="fas fa-check"></i></div>
                                <div class="timeline-label">مُسلَّم</div>
                            </div>
                        </div>

                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div class="order-item-icon">${item.icon}</div>
                                    <div class="order-item-info">
                                        <div class="order-item-name">${item.name}</div>
                                        <div class="order-item-price">$${item.price}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="order-footer">
                            <div>
                                <div class="order-total-label">الإجمالي</div>
                                <div class="order-total-amount">$${order.total}</div>
                            </div>
                            <div class="order-points">
                                <i class="fas fa-coins"></i> +${order.points} نقطة
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('deliveredOrders').textContent = orders.filter(o => o.status === 'delivered').length;
            document.getElementById('totalPoints').textContent = orders.reduce((sum, o) => sum + o.points, 0).toLocaleString();
        }

        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userPoints').textContent = user.points || 0;
                }
            } catch (e) { console.error(e); }
        }

        renderOrders(mockOrders);
        updateStats(mockOrders);
        loadUserData();
    </script>
</body>
</html>
